<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cleanor Image Optimizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon-32.png" width="20" height="20" alt="" />
        <span>Cleanor <b>Image Optimizer</b></span>
      </div>
      <button id="expand" class="ghost" title="Open in a larger tab" type="button">Open larger ↗</button>
    </header>

    <main>
      <section id="drop" class="dropzone" tabindex="0" aria-label="Drop images here">
        <div class="dz-inner">
          <div class="dz-icon" aria-hidden="true">⬇</div>
          <p class="dz-title">Drop images here</p>
          <p class="dz-sub">or <button id="pick" class="link" type="button">choose files</button> · paste with ⌘/Ctrl+V</p>
          <p class="dz-note">PNG · JPEG · WebP · AVIF · GIF · BMP in — WebP / JPEG / PNG out</p>
        </div>
        <input id="file" type="file" accept="image/*" multiple hidden />
      </section>

      <section class="controls" aria-label="Output settings">
        <label class="field">
          <span>Convert to</span>
          <select id="format">
            <option value="image/webp">WebP (smallest)</option>
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG (lossless)</option>
          </select>
        </label>
        <label class="field" id="qualityField">
          <span>Quality <b id="qval">80</b></span>
          <input id="quality" type="range" min="40" max="100" step="1" value="80" />
        </label>
        <label class="field">
          <span>Max width <b id="mwval">original</b></span>
          <input id="maxw" type="range" min="0" max="4000" step="100" value="0" />
        </label>
      </section>

      <section id="results" class="results" hidden>
        <div class="results-head">
          <span id="summary" class="summary"></span>
          <div class="results-actions">
            <button id="downloadAll" class="primary" type="button">Download all</button>
            <button id="clear" class="ghost" type="button">Clear</button>
          </div>
        </div>
        <ul id="list" class="list"></ul>
      </section>
    </main>

    <footer class="footer">
      <span class="privacy">🔒 100% on your device — nothing is uploaded.</span>
      <a href="https://cleanor.app/tools" target="_blank" rel="noopener">More tools at cleanor.app →</a>
    </footer>

    <template id="rowTpl">
      <li class="row">
        <img class="thumb" alt="" width="44" height="44" />
        <div class="meta">
          <span class="name"></span>
          <span class="sizes"></span>
        </div>
        <span class="delta"></span>
        <button class="dl ghost" type="button">Save</button>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
